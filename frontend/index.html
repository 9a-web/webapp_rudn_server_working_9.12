        <!-- 🔇 Подавление console для пользователей (dev.* команды используют __console) -->
        <script>
          (function() {
            if (typeof window === 'undefined') return;
            // Сохраняем оригинальные методы
            window.__console = {
              log: console.log.bind(console),
              debug: console.debug.bind(console),
              warn: console.warn.bind(console),
              info: console.info.bind(console),
              error: console.error.bind(console),
            };
            // Подавляем все кроме error
            var noop = function() {};
            console.log = noop;
            console.debug = noop;
            console.warn = noop;
            console.info = noop;
            // console.error остаётся — ошибки важны
          })();
        </script>

        <!-- 🛑 Блокируем Vite HMR full-reload -->
        <script>
          (function() {
            if (typeof window !== 'undefined') {
              // Блокируем событие vite:beforeFullReload
              window.addEventListener('vite:beforeFullReload', function(e) {
                e.preventDefault();
                return false;
              });
              // Перехватываем location.reload чтобы Vite client не мог перезагрузить страницу
              var _originalReload = window.location.reload.bind(window.location);
              var _reloadBlocked = false;
              Object.defineProperty(window.location, 'reload', {
                configurable: true,
                value: function() {
                  // Разрешаем только явные перезагрузки из нашего кода
                  if (_reloadBlocked) return;
                  _reloadBlocked = true;
                  setTimeout(function() { _reloadBlocked = false; }, 2000);
                  _originalReload();
                }
              });
            }
          })();
        </script>

        <!-- ⭐️ Telegram Full Screen Initialization -->
        <script>
            // Инициализируем full screen сразу при загрузке
            (function() {
                console.log('🟢 [index.html] Начало инициализации Telegram WebApp');
                
                // Ждем загрузки Telegram WebApp API
                var checkTelegram = setInterval(function() {
                    if (window.Telegram && window.Telegram.WebApp) {
                        clearInterval(checkTelegram);
                        
                        var tg = window.Telegram.WebApp;
                        console.log('🟢 [index.html] Telegram WebApp API загружен');
                        console.log('📊 [index.html] Состояние до ready():', {
                            isExpanded: tg.isExpanded,
                            viewportHeight: tg.viewportHeight
                        });
                        
                        // Вызываем ready
                        tg.ready();
                        console.log('✅ [index.html] tg.ready() вызван');
                        
                        // Разворачиваем на полный экран
                        tg.expand();
                        
                        // Проверка через секунду
                        setTimeout(function() {
                            if (!tg.isExpanded) {
                                console.log('🔄 [index.html] Повторный expand');
                                tg.expand();
                            }
                            console.log('📏 [index.html] isExpanded:', tg.isExpanded, ', viewportHeight:', tg.viewportHeight);
                        }, 1000);
                    }
                }, 10);
            })();
        </script>
        
        <title>RUDN Schedule</title>

        <!-- 🛠 Dev Console -->
        <script>
        (function() {
          var C = window.__console || console;
          var _apiBase = '';
          var _getUser = function() {
            try { var s = localStorage.getItem('telegram_user'); if (s) return JSON.parse(s); } catch(e) {}
            return null;
          };
          var _setShowStreakModal = null;
          var _setStreakData = null;

          function api(method, path, body) {
            if (!_apiBase) { C.error('❌ API не настроен. Вызовите dev.setApi("https://...")'); return Promise.reject('no api'); }
            var url = _apiBase + '/api' + (path.charAt(0) === '/' ? path : '/' + path);
            var opts = { method: method, headers: { 'Content-Type': 'application/json' } };
            if (body) opts.body = JSON.stringify(body);
            return fetch(url, opts).then(function(r) { return r.json(); });
          }

          function uid() {
            var u = _getUser();
            if (!u || !u.id) { C.error('❌ Пользователь не найден.'); return null; }
            return u.id;
          }

          function log(e, m, d) { d !== undefined ? C.log(e + ' ' + m, d) : C.log(e + ' ' + m); }

          window.dev = {
            help: function() {
              C.log(
                '%c🛠 Dev Console%c\n\n' +
                'dev.setApi(url)                    — задать backend URL\n' +
                'dev.getUser()                      — текущий пользователь\n' +
                'dev.createUser(id, "Имя")          — создать пользователя\n\n' +
                'dev.createFriend(targetId)          — создать друга\n' +
                'dev.listFriends()                  — список друзей\n' +
                'dev.removeFriend(targetId)          — удалить друга\n' +
                'dev.sendFriendRequest(targetId)     — отправить запрос\n' +
                'dev.listRequests()                 — запросы в друзья\n\n' +
                'dev.addTask("Название")             — создать задачу\n' +
                'dev.listTasks()                    — список задач\n' +
                'dev.deleteTask(taskId)             — удалить задачу\n\n' +
                'dev.showStreakModal()              — показать модалку стрика\n' +
                'dev.hideStreakModal()              — скрыть модалку\n' +
                'dev.recordVisit()                  — записать визит\n\n' +
                'dev.clearUserData()                — удалить данные юзера\n' +
                'dev.apiCall("GET", "/admin/stats") — произвольный вызов\n\n' +
                'dev.enableLogs()                   — включить все console.log\n' +
                'dev.disableLogs()                  — выключить обратно',
                'font-size:14px;font-weight:bold;color:#F7D060', ''
              );
            },

            enableLogs: function() {
              console.log = C.log; console.debug = C.debug; console.warn = C.warn; console.info = C.info;
              C.log('✅ Логи включены');
            },

            disableLogs: function() {
              var noop = function(){};
              console.log = noop; console.debug = noop; console.warn = noop; console.info = noop;
              C.log('🔇 Логи выключены');
            },

            setApi: function(url) {
              _apiBase = url.replace(/\/+$/, '');
              try { localStorage.setItem('dev_api_base', _apiBase); } catch(e) {}
              log('✅', 'API: ' + _apiBase);
            },

            getUser: function() { var u = _getUser(); log('👤', 'Пользователь:', u); return u; },

            getUserSettings: function() {
              var id = uid(); if (!id) return;
              return api('GET', '/user-settings/' + id).then(function(d) { log('⚙️', 'Настройки:', d); return d; }).catch(function(e) { log('❌', '', e); });
            },

            createUser: function(telegramId, firstName) {
              return api('POST', '/user-settings', {
                telegram_id: telegramId, first_name: firstName || 'Тест', last_name: 'Dev', username: 'dev_user_' + telegramId
              }).then(function(d) { log('✅', 'Создан:', d); return d; }).catch(function(e) { log('❌', '', e); });
            },

            createFriend: function(targetId) {
              var myId = uid(); if (!myId) return;
              if (!targetId) { C.error('❌ dev.createFriend(222222)'); return; }
              return api('POST', '/user-settings', {
                telegram_id: targetId, first_name: 'Друг_' + targetId, last_name: 'Тестовый', username: 'friend_' + targetId
              }).catch(function(){}).then(function() {
                log('📨', myId + ' → ' + targetId);
                return api('POST', '/friends/request/' + targetId, { telegram_id: myId });
              }).then(function(r) {
                if (r && r.request_id) {
                  return api('POST', '/friends/accept/' + r.request_id, { telegram_id: targetId });
                }
                return r;
              }).then(function(r) { log('🤝', 'Друг добавлен!', r); return r; }).catch(function(e) { log('❌', '', e); });
            },

            listFriends: function() {
              var id = uid(); if (!id) return;
              return api('GET', '/friends/' + id).then(function(d) { log('👥', '(' + (d.friends ? d.friends.length : 0) + '):', d.friends); return d.friends; }).catch(function(e) { log('❌', '', e); });
            },

            removeFriend: function(targetId) {
              var id = uid(); if (!id) return;
              return fetch(_apiBase + '/api/friends/' + targetId, { method:'DELETE', headers:{'Content-Type':'application/json'}, body:JSON.stringify({telegram_id:id}) })
                .then(function(r){return r.json();}).then(function(d) { log('🗑', 'Удалён:', d); return d; }).catch(function(e) { log('❌', '', e); });
            },

            sendFriendRequest: function(targetId) {
              var id = uid(); if (!id) return;
              return api('POST', '/friends/request/' + targetId, { telegram_id: id }).then(function(d) { log('📨', '', d); return d; }).catch(function(e) { log('❌', '', e); });
            },

            listRequests: function() {
              var id = uid(); if (!id) return;
              return api('GET', '/friends/' + id + '/requests').then(function(d) { log('📬', '', d); return d; }).catch(function(e) { log('❌', '', e); });
            },

            addTask: function(text, opts) {
              var id = uid(); if (!id) return;
              var body = Object.assign({ telegram_id: id, text: text || 'Тестовая задача' }, opts || {});
              return api('POST', '/tasks', body).then(function(d) { log('✅', 'Задача:', d); return d; }).catch(function(e) { log('❌', '', e); });
            },

            listTasks: function() {
              var id = uid(); if (!id) return;
              return api('GET', '/tasks/' + id).then(function(d) { log('📋', '(' + d.length + '):', d); return d; }).catch(function(e) { log('❌', '', e); });
            },

            deleteTask: function(taskId) {
              if (!taskId) { C.error('❌ dev.deleteTask("id")'); return; }
              return fetch(_apiBase + '/api/tasks/' + taskId, {method:'DELETE'}).then(function(r){return r.json();}).then(function(d) { log('🗑', '', d); return d; }).catch(function(e) { log('❌', '', e); });
            },

            showStreakModal: function() {
              if (_setShowStreakModal) {
                if (_setStreakData) {
                  _setStreakData(function(prev) { return prev || {
                    visit_streak_current: 3, visit_streak_max: 3, freeze_shields: 1,
                    streak_continued: true, streak_reset: false, is_new_day: true, milestone_reached: 3,
                    week_days: [{label:'Пн',dateNum:1,done:true},{label:'Вт',dateNum:2,done:true},{label:'Ср',dateNum:3,done:true},{label:'Чт',dateNum:4,done:false},{label:'Пт',dateNum:5,done:false},{label:'Сб',dateNum:6,done:false},{label:'Вс',dateNum:7,done:false}]
                  }; });
                }
                _setShowStreakModal(true);
                log('🔥', 'Модалка показана');
              } else {
                log('⚠️', 'Пройдите Welcome Screen');
              }
            },

            hideStreakModal: function() {
              if (_setShowStreakModal) { _setShowStreakModal(false); log('🔥', 'Скрыта'); }
            },

            recordVisit: function() {
              var id = uid(); if (!id) return;
              return api('POST', '/users/' + id + '/visit').then(function(d) { log('🔥', 'Визит:', d); if (_setStreakData) _setStreakData(d); return d; }).catch(function(e) { log('❌', '', e); });
            },

            clearUserData: function() {
              var id = uid(); if (!id) return;
              return fetch(_apiBase + '/api/user-settings/' + id, {method:'DELETE'}).then(function(r){return r.json();}).then(function(d) { log('🗑', '', d); return d; }).catch(function(e) { log('❌', '', e); });
            },

            apiCall: function(method, path, body) {
              return api(method || 'GET', path || '/', body).then(function(d) { log('📡', (method||'GET') + ' ' + path + ':', d); return d; }).catch(function(e) { log('❌', '', e); });
            },

            _bind: function(refs) {
              if (refs.getUser) _getUser = refs.getUser;
              if (refs.setShowStreakModal) _setShowStreakModal = refs.setShowStreakModal;
              if (refs.setStreakData) _setStreakData = refs.setStreakData;
              if (refs.apiBase) { _apiBase = refs.apiBase; try { localStorage.setItem('dev_api_base', _apiBase); } catch(e) {} }
            }
          };

          try { var s = localStorage.getItem('dev_api_base'); if (s) _apiBase = s; } catch(e) {}
        })();
        </script>
